event_costmap:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.2

    update_frequency: 10.0
    publish_frequency: 5.0

    rolling_window: true
    width: 10.0
    height: 10.0
    resolution: 0.05
    origin_x: -5.0
    origin_y: -5.0
    track_unknown_space: false

    plugins: ["event_layer"]

    event_layer:
      plugin: "event_nav2_layer::EventNav2Layer"
      enabled: true
      # Must match event_clustering_2_0 output (objects_cloud_topic).
      pointcloud_topic: "/dynamic_obstacles"
      max_obstacle_height: 2.0
